name: Банковский Радар · Агент обновления PDF

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 25-31 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install pdfplumber --quiet

      - name: Запуск агента обновления
        run: python scripts/update_data.py

      - name: Коммит обновлённых данных
        run: |
          git config user.name  "Bank Radar Bot"
          git config user.email "bot@bank-radar.local"
          git add data.json .pdf_cache.json || true
          git diff --staged --quiet || git commit -m "данные обновлены $(date +'%d.%m.%Y %H:%M UTC')"
          git push
