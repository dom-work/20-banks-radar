name: Банковский Радар · Агент обновления PDF

on:
  schedule:
    - cron: '0 6 * * *'      # 09:00 МСК
    - cron: '0 12 * * *'     # 15:00 МСК
    - cron: '0 18 25-31 * *' # 21:00 МСК (конец месяца)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber requests openpyxl

      - name: Run update agent
        env:
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python scripts/update_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: auto $(date +'%d.%m.%Y %H:%M')"
          git push
