name: Обновление данных · Банковский Радар

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Запуск агента обновления
        run: python scripts/update_data.py

      - name: Коммит обновлённых данных
        run: |
          git config user.name  "Bank Radar Bot"
          git config user.email "bot@bank-radar"
          git add data.json
          git diff --staged --quiet || git commit -m "данные обновлены $(date +'%d.%m.%Y %H:%M UTC')"
          git push
